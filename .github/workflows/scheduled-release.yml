name: Scheduled Release

on:
  schedule:
    - cron: '0 9 * * MON'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Check commits and create release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for commits and create tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=1
          else
            COMMITS=$(git rev-list ${LAST_TAG}..HEAD --count 2>/dev/null || echo "0")
          fi

          echo "Last tag: $LAST_TAG"
          echo "Commits since: $COMMITS"

          if [ "$COMMITS" -gt "0" ]; then
            # Parse current version from last tag (e.g., v2.3.2 -> 2.3.2)
            if [ -z "$LAST_TAG" ]; then
              MAJOR=0
              MINOR=1
              PATCH=0
            else
              VERSION=${LAST_TAG#v}
              MAJOR=$(echo $VERSION | cut -d. -f1)
              MINOR=$(echo $VERSION | cut -d. -f2)
              PATCH=$(echo $VERSION | cut -d. -f3)
              # Bump minor version (reset patch to 0)
              MINOR=$((MINOR + 1))
              PATCH=0
            fi

            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            NEW_TAG="v$NEW_VERSION"

            echo "Creating tag: $NEW_TAG"

            # Create and push tag
            git tag $NEW_TAG -m "Release $NEW_TAG"
            git push origin $NEW_TAG

            # Create release
            gh release create $NEW_TAG \
              --title "$NEW_TAG" \
              --notes "Release with $COMMITS commit(s) since $LAST_TAG"
          else
            echo "No commits since last release, skipping."
          fi
